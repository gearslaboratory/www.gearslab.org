<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>www.gigafire.org</title>
    <script>
      window.addEventListener("error", function(e) {
        var errDiv = document.createElement('div');
        errDiv.style = 'color:red; background:white; z-index:9999; position:fixed; top:0; left:0; width:100%; height: 100vh; padding:20px; font-family: monospace; overflow: auto;';
        errDiv.innerHTML = "<h1>Runtime Error Captured:</h1>" + (e.error ? e.error.stack.replace(/\n/g, '<br>') : e.message);
        document.body.appendChild(errDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
